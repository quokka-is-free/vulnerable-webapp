{% extends "base.html" %}

{% block title %}Sign In - Helix Systems{% endblock %}

{% block content %}

<div class="form-container">
  <h1 class="form-headline">Sign in.</h1>
  <p class="form-tagline">Access your Helix Systems workspace.</p>

  {% if error %}
  <div class="form-error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <div class="form-group">
      <label for="username">Username</label>
      <input
        type="text"
        id="username"
        name="username"
        class="form-input"
        placeholder="your.name"
        autocomplete="username"
        required
      >
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        class="form-input"
        placeholder="••••••••"
        autocomplete="current-password"
        required
      >
    </div>

    <button type="submit" class="form-submit">Sign in</button>
  </form>

  <div style="text-align: center; margin-top: 24px; font-size: 14px; color: #6e6e73; letter-spacing: -0.224px;">
    Need help signing in? <a href="/" style="color: #0066cc; text-decoration: none;">Contact IT Support ›</a>
  </div>

  <div style="text-align: center; margin-top: 16px; font-size: 12px; color: #86868b; letter-spacing: -0.12px;">
    Demo credentials: admin / admin123
  </div>
</div>

{% endblock %}
